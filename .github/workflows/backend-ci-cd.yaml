name: Spring Boot CI + SonarCloud

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-sonar:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ./backend/.gradle/caches
        key: gradle-${{ runner.os }}-${{ hashFiles('backend/**/build.gradle*') }}
        restore-keys: gradle-${{ runner.os }}-

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Grant execute permission
      working-directory: ./backend
      run: chmod +x gradlew

    - name: Wait for PostgreSQL
      run: |
        for i in {1..30}; do
          nc -z localhost 5432 && echo "PostgreSQL ready!" && exit 0
          sleep 1
        done
        exit 1

    - name: Build and Test
      working-directory: ./backend
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
        SPRING_DATASOURCE_USERNAME: testuser
        SPRING_DATASOURCE_PASSWORD: testpassword
        SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
        SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: true
        SPRING_FLYWAY_ENABLED: false
      run: ./gradlew test --no-daemon --parallel --max-parallel-forks=4 --continue --no-build-cache

    - name: SonarCloud Scan
      if: success() && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main')
      working-directory: ./backend
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: ./gradlew sonar
